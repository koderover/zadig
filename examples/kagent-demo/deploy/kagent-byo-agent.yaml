apiVersion: v1
kind: Secret
metadata:
  name: hello-agent-model-config
  namespace: kagent
type: Opaque
stringData:
  MODEL_PROVIDER: "openai"
  MODEL_BASE_URL: { { .api_base_url } }
  MODEL_API_KEY: { { .api_key } }
  MODEL_NAME: { { .model } }
  MODEL_TIMEOUT: "600s"
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: hello-devops-agent
  namespace: kagent
spec:
  description: DevOps runbook assistant backed by a Go ADK agent.
  type: BYO
  byo:
    deployment:
      image: koderover.tencentcloudcr.com/koderover-demo/hello-agent:latest
      env:
        - name: MODEL_PROVIDER
          valueFrom:
            secretKeyRef:
              name: hello-agent-model-config
              key: MODEL_PROVIDER
        - name: MODEL_BASE_URL
          valueFrom:
            secretKeyRef:
              name: hello-agent-model-config
              key: MODEL_BASE_URL
        - name: MODEL_API_KEY
          valueFrom:
            secretKeyRef:
              name: hello-agent-model-config
              key: MODEL_API_KEY
        - name: MODEL_NAME
          valueFrom:
            secretKeyRef:
              name: hello-agent-model-config
              key: MODEL_NAME
        - name: MODEL_TIMEOUT
          valueFrom:
            secretKeyRef:
              name: hello-agent-model-config
              key: MODEL_TIMEOUT
